services:
  trainer:
    build:
      context: ./services/trainer
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./dataset:/app/dataset
      - ./services/trainer:/app
      - ./checkpoints:/checkpoints
    working_dir: /app
    environment:
      - WS_RELAY_URL=${WS_RELAY_URL:-ws://192.168.10.1:8080/ws/training}
      - CHECKPOINT_DIR=${CHECKPOINT_DIR:-/checkpoints}
      - DATASET_ROOT=/app/dataset
      - HF_HOME=/app/dataset/_hf_cache
      - TORCH_HOME=/app/dataset/_torch_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
