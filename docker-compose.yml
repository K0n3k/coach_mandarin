services:
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    image: coach-mandarin-frontend
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.coach.rule=Host(`coach.${HOST_DOMAIN}`)
      - traefik.http.services.coach.loadbalancer.server.port=8080
      - traefik.http.routers.coach.entrypoints=${ENTRYPOINT}
      - traefik.http.routers.coach.tls.certresolver=${RESOLVER}
      - traefik.http.routers.coach.middlewares=local-whitelist@docker
    networks:
      - traefik_default
      - default
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: coach-mandarin-api
    env_file: .env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
    restart: unless-stopped

  # postgres et redis déjà en place sur proliant — ne pas recréer
  # Référence réseau uniquement pour que l'API puisse y accéder

networks:
  traefik_default:
    name: traefik_default
    external: true
  default:
    driver: bridge
